spring:
  application:
    name: ce-merging-server
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jpa:
    properties:
      hibernate:
        timezone:
          default_storage: NORMALIZE
    hibernate:
      ddl-auto: update

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

ce-merging-server:
  filesystem:
    root: ${HOME}/ce-merging-server/filesystem
    root-daily: ${HOME}/ce-merging-server/filesystem-daily-merging